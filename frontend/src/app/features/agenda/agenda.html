<div class="agenda-wrapper">
  <h2>Agenda del Psicólogo</h2>
  <div class="calendar-container">
    <full-calendar [options]="calendarOptions()"></full-calendar>
  </div>
</div>

<div class="modal-overlay" *ngIf="isModalOpen()">
  <div class="modal-content">
    <h3>Agendar Nueva Cita</h3>
    <p class="modal-subtitle">Inicio: {{ formData.fechaInicio | date:'short' }}</p>
    
    <div class="form-group">
      <label>Nombre del Paciente:</label>
      <input type="text" [(ngModel)]="formData.nombrePaciente" placeholder="Ej. Carlos Torres">
    </div>

    <div class="form-group">
      <label>Teléfono (Usado para buscar paciente):</label>
      <input type="text" [(ngModel)]="formData.telefonoPaciente" placeholder="Ej. 70012345">
    </div>

    <div class="form-group">
      <label>Motivo de Consulta:</label>
      <textarea [(ngModel)]="formData.motivoConsulta" rows="3" placeholder="Opcional"></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" (click)="closeModal()" [disabled]="isLoading()">Cancelar</button>
      <button class="btn-save" (click)="saveAppointment()" [disabled]="isLoading()">
        {{ isLoading() ? 'Guardando...' : 'Confirmar Cita' }}
      </button>
    </div>
  </div>
</div>
