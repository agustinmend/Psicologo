<div class="modal-overlay" (click)="onCancelar()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    
    <h2>Agendar nueva cita</h2>
    
    <form [formGroup]="citaForm" (ngSubmit)="onGuardar()">
      <div class="form-group">
        <label for="titulo">Título de la cita</label>
        <input id="titulo" type="text" formControlName="titulo" placeholder="Ej. Terapia individual">
      </div>

      <div class="form-group">
        <label for="nombrePaciente">Nombre del paciente</label>
        <input id="nombrePaciente" type="text" formControlName="nombrePaciente" placeholder="Nombre completo">
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="fecha">Fecha</label>
          <input id="fecha" type="date" formControlName="fecha">
        </div>
        <div class="form-group">
          </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="horaInicio">Inicio</label>
          <input id="horaInicio" type="time" formControlName="horaInicio">
        </div>
        <div class="form-group">
          <label for="horaFin">Fin</label>
          <input id="horaFin" type="time" formControlName="horaFin">
        </div>
      </div>

      <div class="form-group">
        <label for="descripcion">Descripción</label>
        <textarea id="descripcion" rows="3" formControlName="descripcion" placeholder="Detalles de la cita..."></textarea>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-secondary" (click)="onCancelar()">Cancelar</button>
        <button type="submit" class="btn-primary" [disabled]="citaForm.invalid">Guardar Cita</button>
      </div>
    </form>

  </div>
</div>
